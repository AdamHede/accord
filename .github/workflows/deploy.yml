name: Validate and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

# Never let two production deployments update the same Worker concurrently.
concurrency:
  group: accord-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Validate and deploy to Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Deploy Worker
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
